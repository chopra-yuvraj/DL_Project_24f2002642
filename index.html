<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>spotiknow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #ccc;
      font-family: 'Courier New', monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 24px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-shrink: 0;
    }

    header .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #eee;
      letter-spacing: -0.02em;
    }

    header .sub {
      font-size: 0.65rem;
      color: #3a3a3a;
      letter-spacing: 0.1em;
    }

    .fallback-link {
      margin-left: auto;
      font-size: 0.65rem;
      color: #555;
      letter-spacing: 0.06em;
      text-decoration: none;
      white-space: nowrap;
    }

    .fallback-link:hover {
      color: #999;
    }

    .frame-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #loading-msg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.08em;
      pointer-events: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">spotiknow</span>
    <span class="sub">music genre classifier &nbsp;·&nbsp; 24f2002642 &nbsp;·&nbsp; IIT Madras T1-2026</span>
    <a class="fallback-link" href="https://yuvraj-chopra-dl-gen-ai-project.hf.space" target="_blank" rel="noopener">
      having trouble? open directly &rarr;
    </a>
  </header>
  <div class="frame-wrap">
    <div id="loading-msg">loading spotiknow&hellip;</div>
    <iframe
      id="spotiknow-frame"
      allow="microphone"
      loading="lazy"
    ></iframe>
  </div>

  <script>
    // The Gradio Space rebuilds its static assets (hashed filenames under
    // /_app/immutable/...) on every deploy and deletes the old ones. If a
    // visitor's browser has a cached copy of the Space's HTML from a
    // previous deploy, it points at asset files that no longer exist and
    // the app fails to boot (404s + "failed to fetch dynamically imported
    // module" in the console). Appending a fresh query string on every
    // page load stops the browser from reusing that cached HTML, so it
    // always fetches the current build's entry page instead.
    var frame = document.getElementById('spotiknow-frame');
    var loadingMsg = document.getElementById('loading-msg');

    // "load" fires once the iframe's own document has finished loading -
    // this hides the loading message once *something* has rendered.
    // Note: this can't detect JS errors happening inside the iframe's
    // own page (that's a different origin, the browser won't let this
    // parent page see into it) - it only confirms the document itself
    // loaded. If the app still looks broken after this fires, the fix
    // isn't on this page; it's the fallback link above, or a fresh
    // console log so the underlying issue on the Space side can be
    // pinned down.
    frame.addEventListener('load', function () {
      loadingMsg.style.display = 'none';
    });

    frame.src = 'https://yuvraj-chopra-dl-gen-ai-project.hf.space?cachebust=' + Date.now();
  </script>
</body>
</html>
