<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>spotiknow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #ccc;
      font-family: 'Courier New', monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 24px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-shrink: 0;
    }

    header .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #eee;
      letter-spacing: -0.02em;
    }

    header .sub {
      font-size: 0.65rem;
      color: #3a3a3a;
      letter-spacing: 0.1em;
    }

    .frame-wrap {
      flex: 1;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">spotiknow</span>
    <span class="sub">music genre classifier &nbsp;·&nbsp; 24f2002642 &nbsp;·&nbsp; IIT Madras T1-2026</span>
  </header>
  <div class="frame-wrap">
    <iframe
      src="https://yuvraj-chopra-dl-gen-ai-project.hf.space"
      allow="microphone"
      loading="lazy"
    ></iframe>
  </div>
</body>
</html>
